site_name: iCLI
site_description: Scenario-first JVM library for safe external CLI automation.
site_url: https://ulviar.github.io/iCLI/
repo_name: Ulviar/iCLI
repo_url: https://github.com/Ulviar/iCLI
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: build/public-docs
strict: true

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Examples: examples.md
  - Scenarios:
      - scenarios/index.md
      - Run: scenarios/run.md
      - Interactive Sessions: scenarios/interactive.md
      - Expect Automation: scenarios/expect.md
      - Line Sessions: scenarios/line-session.md
      - Streaming: scenarios/streaming.md
      - Pooling: scenarios/pooling.md
      - Terminal Capability: scenarios/terminal.md
      - Scenario Presets: scenarios/presets.md
      - Integrations: scenarios/integrations.md
  - How-to:
      - how-to/index.md
      - Run a Finite Command: how-to/run-finite-command.md
      - Stop Hung Processes: how-to/stop-hung-processes.md
      - Follow Logs: how-to/follow-logs.md
      - Talk to a Line Worker: how-to/talk-to-line-worker.md
      - Automate Prompts: how-to/automate-prompts.md
      - Require a Terminal: how-to/require-terminal.md
      - Reuse Workers: how-to/reuse-workers.md
      - Wrap a CLI Tool: how-to/wrap-cli-tool.md
  - Reference:
      - reference/index.md
      - Command Model: reference/command-model.md
      - Policies: reference/policies.md
      - Results and Errors: reference/results-and-errors.md
      - Diagnostics: reference/diagnostics.md
      - Security: reference/security.md
      - Platforms and PTY: reference/platforms-and-pty.md
  - Explanation:
      - Scenario-first Design: explanations/scenario-first.md
  - API: api/index.md
  - Release:
      - release/index.md
      - Installation: release/installation.md
      - API Baseline: release/api-baseline.md
      - Compatibility: release/compatibility.md
      - Known Limitations: release/known-limitations.md
      - Migration Notes: release/migration.md
      - Release Notes Draft: release/release-notes.md
