name: CI

on:
  push:
    branches:
      - main
      - rewrite/**
  pull_request:

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Verify Unix
        if: runner.os != 'Windows'
        run: ./gradlew check javadoc --no-daemon

      - name: Verify Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat check javadoc --no-daemon
