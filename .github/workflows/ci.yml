name: CI

on:
  push:
    branches:
      - main
      - rewrite/**
  pull_request:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  verify:
    name: Verify Java ${{ matrix.java-release }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java-release:
          - 17
          - 21
          - 25
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK ${{ matrix.java-release }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: ${{ matrix.java-release }}

      - name: Verify Unix
        if: runner.os != 'Windows'
        run: ./gradlew check javadoc --project-prop=icli.javaRelease=${{ matrix.java-release }} --no-daemon

      - name: Verify Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat check javadoc --project-prop=icli.javaRelease=${{ matrix.java-release }} --no-daemon

      - name: Publication smoke Unix
        if: runner.os != 'Windows' && matrix.java-release == 17
        run: ./gradlew publishToMavenLocal --project-prop=icli.javaRelease=17 --no-daemon

      - name: Publication smoke Windows
        if: runner.os == 'Windows' && matrix.java-release == 17
        run: .\gradlew.bat publishToMavenLocal --project-prop=icli.javaRelease=17 --no-daemon

  publish-github-packages:
    name: Publish GitHub Packages
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 17

      - name: Publish
        run: |
          release_version="${ICLI_RELEASE_TAG#v}"
          ./gradlew publish --project-prop=icli.javaRelease=17 --project-prop=icli.version="$release_version" --no-daemon
        env:
          ICLI_RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
