name: CI

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify Java 17 artifact on Java ${{ matrix.java-runtime }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            java-runtime: 17
            verification: regressionCheck spotlessCheck
          - os: macos-latest
            java-runtime: 17
            verification: scenarioCheck
          - os: windows-2025
            java-runtime: 17
            verification: scenarioCheck
          - os: ubuntu-24.04
            java-runtime: 21
            verification: scenarioCheck
          - os: ubuntu-24.04
            java-runtime: 25
            verification: scenarioCheck

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK ${{ matrix.java-runtime }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-runtime }}

      # Provides build caching and validates Gradle wrapper jars automatically.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Verify system PTY prerequisites
        if: runner.os != 'Windows' && matrix.java-runtime == 17
        run: command -v script && command -v stty && command -v env && command -v dd

      - name: Verify Unix
        if: runner.os != 'Windows'
        run: ./gradlew ${{ matrix.verification }} --project-prop=procwright.javaRelease=17 --no-daemon
        env:
          ORG_GRADLE_PROJECT_procwright.requireSystemPty: ${{ runner.os != 'Windows' && matrix.java-runtime == 17 }}

      - name: Verify Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat ${{ matrix.verification }} --project-prop=procwright.javaRelease=17 --no-daemon

      - name: Publication smoke Unix
        if: matrix.os == 'ubuntu-24.04' && matrix.java-runtime == 17
        run: |
          set -euo pipefail
          repository="${RUNNER_TEMP}/procwright-m2"
          ./gradlew publishToMavenLocal \
            -Dmaven.repo.local="${repository}" \
            --project-prop=procwright.javaRelease=17 \
            --project-prop=procwright.version=0.1.0 \
            --no-daemon
          ./gradlew \
            :procwright-consumer-examples:test \
            :procwright-integrations-consumer-example:check \
            :procwright-kotlin-consumer-example:check \
            --project-prop=procwright.javaRelease=17 \
            --project-prop=procwright.consumerVersion=0.1.0 \
            --project-prop=procwright.consumerRepository="${repository}" \
            --dependency-verification=off \
            --refresh-dependencies \
            --rerun-tasks \
            --no-daemon
          ./gradlew \
            :procwright-consumer-examples:test \
            :procwright-integrations-consumer-example:check \
            :procwright-kotlin-consumer-example:check \
            --project-prop=procwright.javaRelease=17 \
            --project-prop=procwright.consumerVersion=0.1.0 \
            --project-prop=procwright.consumerRepository="${repository}" \
            --project-prop=procwright.consumerPomOnly=true \
            --dependency-verification=off \
            --refresh-dependencies \
            --rerun-tasks \
            --no-daemon

      - name: Upload failed test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: failed-tests-${{ matrix.os }}-java-${{ matrix.java-runtime }}
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 7

  source-variants:
    name: Verify source target Java ${{ matrix.java-release }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-release:
          - 21
          - 25

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK ${{ matrix.java-release }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-release }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Verify source variant
        run: ./gradlew scenarioCheck --project-prop=procwright.javaRelease=${{ matrix.java-release }} --no-daemon

      - name: Upload failed test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: failed-tests-source-java-${{ matrix.java-release }}
          path: |
            **/build/test-results/**
            **/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 7

  docs:
    name: Docs
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17.0.19+10"

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.10.12"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build docs site in strict mode
        run: ./gradlew publicDocsCheck --project-prop=procwright.javaRelease=17 --no-daemon

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/public-docs

  deploy-docs:
    name: Deploy documentation
    needs:
      - verify
      - source-variants
      - docs
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
