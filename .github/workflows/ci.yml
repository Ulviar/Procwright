name: CI

on:
  push:
    branches:
      - main
      - rewrite/**
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "25"

      - name: Verify Unix
        if: runner.os != 'Windows'
        run: ./gradlew check javadoc --no-daemon

      - name: Verify Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat check javadoc --no-daemon
