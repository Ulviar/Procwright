name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      consumer-version:
        description: Maven Central version to smoke-test as an external consumer
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify Java ${{ matrix.java-release }} on ${{ matrix.os }}
    if: github.event_name != 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        java-release:
          - 17
          - 21
          - 25
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK ${{ matrix.java-release }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-release }}

      # Provides build caching and validates Gradle wrapper jars automatically.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Verify Unix
        if: runner.os != 'Windows'
        run: ./gradlew check publicJavaJavadocCheck --project-prop=procwright.javaRelease=${{ matrix.java-release }} --no-daemon

      - name: Verify Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat check publicJavaJavadocCheck --project-prop=procwright.javaRelease=${{ matrix.java-release }} --no-daemon

      - name: Publication smoke Unix
        if: runner.os != 'Windows' && matrix.java-release == 17
        run: ./gradlew publishToMavenLocal --project-prop=procwright.javaRelease=17 --no-daemon

      - name: Publication smoke Windows
        if: runner.os == 'Windows' && matrix.java-release == 17
        run: .\gradlew.bat publishToMavenLocal --project-prop=procwright.javaRelease=17 --no-daemon

  docs:
    name: Docs
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Build docs site in strict mode
        run: ./gradlew publicDocsCheck --project-prop=procwright.javaRelease=17 --no-daemon

  comparison-compile:
    name: Comparison Compile
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Non-blocking: procwright-comparison is a research module; compile rot is
    # reported without gating the build.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Compile comparison module including JMH sources
        run: ./gradlew :procwright-comparison:compileJava :procwright-comparison:compileTestJava :procwright-comparison:jmhCompileCheck --project-prop=procwright.javaRelease=25 --no-daemon

  publish-maven-central:
    name: Publish Maven Central
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    environment: maven-central
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Build Maven Central bundle
        run: |
          set -euo pipefail
          release_version="${PROCWRIGHT_RELEASE_TAG#v}"
          ./gradlew mavenCentralBundle --project-prop=procwright.javaRelease=17 --project-prop=procwright.version="$release_version" --no-daemon
        env:
          PROCWRIGHT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Upload Maven Central deployment
        run: |
          set -euo pipefail
          release_version="${PROCWRIGHT_RELEASE_TAG#v}"
          bundle="build/maven-central/procwright-${release_version}-maven-central-bundle.zip"
          central_token="$(printf "%s:%s" "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 | tr -d '\n')"
          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer ${central_token}" \
            --form "bundle=@${bundle}" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=io.github.ulviar:procwright:${release_version}&publishingType=USER_MANAGED"
        env:
          PROCWRIGHT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

  consumer-smoke-maven-central:
    name: Consumer Smoke Maven Central
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Compile and run external consumer
        run: |
          set -euo pipefail
          release_version="${PROCWRIGHT_CONSUMER_VERSION}"
          consumer_dir="${RUNNER_TEMP}/procwright-consumer-smoke"
          mkdir -p "${consumer_dir}/src/main/java/consumer"

          cat > "${consumer_dir}/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  mavenCentral()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  mavenCentral()
              }
          }

          rootProject.name = "procwright-consumer-smoke"
          EOF

          cat > "${consumer_dir}/build.gradle.kts" <<'EOF'
          plugins {
              application
          }

          java {
              toolchain {
                  languageVersion.set(JavaLanguageVersion.of(17))
              }
          }

          val procwrightVersion = providers.environmentVariable("PROCWRIGHT_CONSUMER_VERSION").get()

          dependencies {
              implementation("io.github.ulviar:procwright:$procwrightVersion")
              implementation("io.github.ulviar:procwright-integrations:$procwrightVersion")
              implementation("io.github.ulviar:procwright-kotlin:$procwrightVersion")
          }

          application {
              mainClass.set("consumer.ConsumerSmoke")
          }
          EOF

          cat > "${consumer_dir}/src/main/java/consumer/ConsumerSmoke.java" <<'EOF'
          package consumer;

          import io.github.ulviar.procwright.Procwright;
          import io.github.ulviar.procwright.command.CapturePolicy;
          import io.github.ulviar.procwright.command.CommandSpec;
          import io.github.ulviar.procwright.integration.JsonValue;
          import io.github.ulviar.procwright.kotlin.ProcwrightKotlinKt;
          import java.util.Map;

          public final class ConsumerSmoke {
              private ConsumerSmoke() {}

              public static void main(String[] args) {
                  Object service = Procwright.command(CommandSpec.of("java"));
                  Object capturePolicy = CapturePolicy.bounded(1024);
                  Object json = JsonValue.object(Map.of("ok", JsonValue.bool(true)));
                  System.out.println(service.getClass().getName());
                  System.out.println(capturePolicy.getClass().getName());
                  System.out.println(json.getClass().getName());
                  System.out.println(ProcwrightKotlinKt.class.getName());
              }
          }
          EOF

          PROCWRIGHT_CONSUMER_VERSION="${release_version}" ./gradlew --project-dir "${consumer_dir}" --refresh-dependencies run --no-daemon
        env:
          PROCWRIGHT_CONSUMER_VERSION: ${{ inputs.consumer-version }}
