name: Bug report
description: Report a defect in Procwright
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: >-
        The smallest code sample that reproduces the issue. Please mention
        which scenario you used (run, interactive, lineSession,
        protocolSession, listen, etc.) and the relevant options.
      render: java
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: procwright-version
    attributes:
      label: Procwright version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: JVM version and operating system
      placeholder: e.g. Temurin 21.0.7 on Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant exception or transcript output
      description: >-
        Stack trace, exception message, or transcript excerpt that shows the
        failure. This will be automatically formatted as code.
      render: text
